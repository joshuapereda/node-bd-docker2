services:
  # BACKEND NODE
  backend_node:
    container_name: backend_node
    build: .
    ports:
      - "83:3000"
    depends_on:
      - base_datos_mysql

  # MYSQL
  base_datos_mysql:
    container_name: base_datos_mysql
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3333:3306"
    volumes:
    #se creara un carpeta en el proyecto llamada mysql_data_service y
    #se registrara todos los datos de la BASE DE DATOS ahi, para que no
    #se pierdan al eliminar el contenedor
    - ./mysql_data_service:/var/lib/mysql

  # PHPMYADMIN
  db_phpmyadmin:
    container_name: db_phpmyadmin
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: base_datos_mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "7777:80"
    depends_on:
      - base_datos_mysql

